{% extends 'recommend/base.html' %}
{% block body %}
<style>
    .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 75vh;
        background: radial-gradient(circle at center, #2a0808 0%, #141414 70%);
        animation: pulseBg 8s infinite alternate ease-in-out;
    }

    @keyframes pulseBg {
        0% { background: radial-gradient(circle at center, #2a0808 0%, #141414 70%); }
        100% { background: radial-gradient(circle at center, #4a0c0c 0%, #141414 90%); }
    }

    /* Glassmorphism Card */
    .auth-card {
        background-color: rgba(0, 0, 0, 0.75);
        backdrop-filter: blur(10px);
        padding: 60px 68px 40px;
        border-radius: 10px;
        width: 100%;
        max-width: 450px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.8);
        border: 1px solid rgba(255,255,255,0.1);
    }

    .auth-card h2 {
        color: white;
        margin-top: 0;
        margin-bottom: 30px;
        font-weight: 700;
        font-size: 32px;
    }

    .modern-input {
        width: 100%;
        background: #333;
        border: none;
        border-radius: 4px;
        padding: 16px 20px;
        color: white;
        margin-bottom: 20px;
        box-sizing: border-box;
        font-size: 16px;
        transition: 0.2s;
    }

    .modern-input:focus {
        outline: none;
        background: #444;
        border-bottom: 2px solid #e50914;
    }

    .modern-btn {
        width: 100%;
        padding: 16px;
        background: #e50914;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 20px;
        transition: background 0.2s;
    }

    .modern-btn:hover {
        background: #f40612;
    }

    .auth-links {
        color: #737373;
        margin-top: 30px;
        font-size: 15px;
    }
    
    .auth-links a {
        color: white;
        text-decoration: none;
    }
    
    .auth-links a:hover {
        text-decoration: underline;
    }

    .error-alert {
        background: #e87c03;
        color: white;
        padding: 12px;
        border-radius: 4px;
        margin-bottom: 20px;
        font-size: 14px;
    }
</style>

<div class="auth-container">
    <div class="auth-card">
        <h2>Sign In</h2>
        
        {% if error_message %}
            <div class="error-alert">{{ error_message }}</div>
        {% endif %}
        
        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <input type="text" name="username" class="modern-input" placeholder="Username" required>
            <input type="password" name="password" class="modern-input" placeholder="Password" required>
            
            <button type="submit" class="modern-btn">Sign In</button>
        </form>
        
        <div class="auth-links">
            New to CineMatch AI? <a href="{% url 'signup' %}">Sign up now.</a>
        </div>
    </div>
</div>
{% endblock %}
